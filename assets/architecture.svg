<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" width="900" height="680">
  <defs>
    <style>
      text { font-family: 'Segoe Print', 'Comic Sans MS', 'Virgil', cursive; }
      .title { font-size: 22px; font-weight: bold; fill: #e2e8f0; }
      .label { font-size: 15px; fill: #e2e8f0; font-weight: bold; }
      .sublabel { font-size: 11.5px; fill: #94a3b8; }
      .note { font-size: 12px; fill: #94a3b8; font-style: italic; }
      .legend { font-size: 11px; fill: #94a3b8; }
    </style>
    <filter id="sketch" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="noise" seed="3"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="#0f111a" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" class="title">CargoBay Architecture</text>
  <path d="M 280 44 Q 450 48 620 44" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- ═══ CLIENT LAYER ═══ -->

  <!-- GUI Box -->
  <rect x="80" y="65" width="210" height="80" rx="14" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="2.5" filter="url(#sketch)"/>
  <circle cx="108" cy="90" r="7" fill="#8b5cf6" opacity="0.7"/>
  <text x="125" y="95" class="label" fill="#c4b5fd">GUI App</text>
  <text x="100" y="120" class="sublabel">Tauri v2 + React / TS</text>

  <!-- CLI Box -->
  <rect x="345" y="65" width="210" height="80" rx="14" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="2.5" filter="url(#sketch)"/>
  <circle cx="373" cy="90" r="7" fill="#8b5cf6" opacity="0.7"/>
  <text x="390" y="95" class="label" fill="#c4b5fd">CLI</text>
  <text x="365" y="120" class="sublabel">Rust / clap</text>

  <!-- Path annotations -->
  <text x="105" y="168" class="note">containers / images / volumes</text>
  <text x="400" y="168" class="note">VMs</text>
  <text x="670" y="168" class="note">K8s</text>

  <!-- ═══ ARROWS FROM CLIENTS ═══ -->

  <!-- GUI → bollard -->
  <path d="M 155 145 C 155 165, 155 180, 155 200" stroke="#0db7ed" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="155,207 149,195 161,195" fill="#0db7ed"/>

  <!-- CLI → bollard (faint) -->
  <path d="M 400 145 C 350 170, 250 190, 195 205" stroke="#0db7ed" stroke-width="1.5" fill="none" opacity="0.35" stroke-dasharray="5,4"/>

  <!-- GUI → gRPC -->
  <path d="M 240 145 C 300 175, 370 185, 430 205" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="435,210 423,200 427,212" fill="#22d3ee"/>

  <!-- CLI → gRPC -->
  <path d="M 460 145 C 460 165, 455 180, 450 200" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- GUI → kubectl -->
  <path d="M 280 100 C 420 85, 580 110, 700 205" stroke="#326ce5" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="6,3"/>
  <polygon points="703,210 691,200 698,212" fill="#326ce5"/>

  <!-- CLI → kubectl (faint) -->
  <path d="M 540 100 C 600 130, 660 170, 700 205" stroke="#326ce5" stroke-width="1.5" fill="none" opacity="0.35" stroke-dasharray="5,4"/>

  <!-- ═══ MIDDLE LAYER ═══ -->

  <!-- bollard Box -->
  <rect x="55" y="210" width="210" height="68" rx="12" fill="#0db7ed" fill-opacity="0.12" stroke="#0db7ed" stroke-width="2" filter="url(#sketch)"/>
  <text x="105" y="238" class="label" fill="#7dd3fc">bollard</text>
  <text x="78" y="260" class="sublabel">Docker socket (direct connect)</text>

  <!-- gRPC Box -->
  <rect x="325" y="210" width="210" height="68" rx="12" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-width="2" filter="url(#sketch)"/>
  <text x="380" y="238" class="label" fill="#67e8f9">gRPC (tonic)</text>
  <text x="360" y="260" class="sublabel">VM operations only</text>

  <!-- kubectl Box -->
  <rect x="595" y="210" width="210" height="68" rx="12" fill="#326ce5" fill-opacity="0.12" stroke="#326ce5" stroke-width="2" filter="url(#sketch)"/>
  <text x="650" y="238" class="label" fill="#93c5fd">kubectl</text>
  <text x="620" y="260" class="sublabel">JSON output parsing</text>

  <!-- ═══ ARROWS DOWN ═══ -->

  <!-- bollard → Docker daemon -->
  <path d="M 160 278 C 160 295, 160 305, 160 325" stroke="#0db7ed" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="160,332 154,320 166,320" fill="#0db7ed"/>

  <!-- gRPC → Daemon -->
  <path d="M 430 278 C 430 295, 430 305, 430 325" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="430,332 424,320 436,320" fill="#22d3ee"/>

  <!-- kubectl → K8s API -->
  <path d="M 700 278 C 700 295, 700 305, 700 325" stroke="#326ce5" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="700,332 694,320 706,320" fill="#326ce5"/>

  <!-- ═══ BOTTOM-MIDDLE LAYER ═══ -->

  <!-- Docker Daemon Box -->
  <rect x="55" y="335" width="210" height="80" rx="14" fill="#0db7ed" fill-opacity="0.08" stroke="#0db7ed" stroke-width="2" filter="url(#sketch)"/>
  <text x="95" y="365" class="label" fill="#7dd3fc">Docker Daemon</text>
  <text x="78" y="390" class="sublabel">containers, images, volumes</text>

  <!-- CargoBay Daemon Box -->
  <rect x="325" y="335" width="210" height="80" rx="14" fill="#22d3ee" fill-opacity="0.18" stroke="#22d3ee" stroke-width="2.5" filter="url(#sketch)"/>
  <text x="345" y="365" class="label" fill="#67e8f9">CargoBay Daemon</text>
  <text x="355" y="390" class="sublabel">Rust / tokio / gRPC server</text>

  <!-- K8s API Box -->
  <rect x="595" y="335" width="210" height="80" rx="14" fill="#326ce5" fill-opacity="0.08" stroke="#326ce5" stroke-width="2" filter="url(#sketch)"/>
  <text x="635" y="365" class="label" fill="#93c5fd">K8s API Server</text>
  <text x="618" y="390" class="sublabel">pods, services, deployments</text>

  <!-- ═══ DAEMON → HYPERVISOR ═══ -->

  <path d="M 430 415 C 430 430, 430 440, 430 455" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="430,460 424,448 436,448" fill="#22d3ee"/>

  <!-- Hypervisor trait banner -->
  <rect x="115" y="462" width="575" height="40" rx="8" fill="#1e293b" fill-opacity="0.5" stroke="#475569" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="402" y="487" text-anchor="middle" class="sublabel" fill="#94a3b8">Hypervisor Trait  (abstraction layer)</text>

  <!-- ═══ PLATFORM BOXES ═══ -->

  <!-- macOS -->
  <rect x="115" y="518" width="175" height="85" rx="14" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-width="2" filter="url(#sketch)"/>
  <text x="150" y="546" class="label" fill="#6ee7b7">macOS</text>
  <text x="135" y="566" class="sublabel">Virtualization.framework</text>
  <text x="135" y="584" class="sublabel">+ Rosetta  + VirtioFS</text>

  <!-- Linux -->
  <rect x="315" y="518" width="175" height="85" rx="14" fill="#fbbf24" fill-opacity="0.1" stroke="#fbbf24" stroke-width="2" filter="url(#sketch)"/>
  <text x="365" y="546" class="label" fill="#fde68a">Linux</text>
  <text x="345" y="566" class="sublabel">KVM (rust-vmm)</text>
  <text x="345" y="584" class="sublabel">+ virtiofsd</text>

  <!-- Windows -->
  <rect x="515" y="518" width="175" height="85" rx="14" fill="#60a5fa" fill-opacity="0.1" stroke="#60a5fa" stroke-width="2" filter="url(#sketch)"/>
  <text x="555" y="546" class="label" fill="#93c5fd">Windows</text>
  <text x="540" y="566" class="sublabel">Hyper-V</text>
  <text x="540" y="584" class="sublabel">+ Plan 9 / SMB</text>

  <!-- K3s Manager (floating, bottom-right) -->
  <rect x="720" y="462" width="155" height="55" rx="10" fill="#326ce5" fill-opacity="0.1" stroke="#326ce5" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#sketch)"/>
  <text x="745" y="487" class="label" fill="#93c5fd">K3s Manager</text>
  <text x="738" y="504" class="sublabel">on-demand download</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="115" y="630" width="14" height="14" rx="4" fill="#0db7ed"/>
  <text x="137" y="642" class="legend">Docker socket (direct)</text>

  <rect x="310" y="630" width="14" height="14" rx="4" fill="#22d3ee"/>
  <text x="332" y="642" class="legend">gRPC → Daemon (VMs)</text>

  <rect x="510" y="630" width="14" height="14" rx="4" fill="#326ce5"/>
  <text x="532" y="642" class="legend">kubectl (K8s queries)</text>

  <rect x="700" y="630" width="14" height="14" rx="4" fill="#34d399"/>
  <text x="722" y="642" class="legend">Platform backends</text>
</svg>
