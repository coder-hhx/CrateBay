<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrateBay — Coming Soon</title>
  <meta name="description" content="CrateBay — Coming Soon" />
  <meta name="keywords" content="coming soon" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: rgba(17, 24, 39, 0.82);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #67e8f9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(103, 232, 249, 0.18), transparent 38%),
        linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(100%, 720px);
      padding: 48px 32px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
    }
    img {
      width: 84px;
      height: 84px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: clamp(40px, 8vw, 64px);
      line-height: 1;
    }
    p {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 16px;
    }
    .badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(103, 232, 249, 0.28);
      background: rgba(103, 232, 249, 0.08);
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">CrateBay</div>
    <img src="logo.png" alt="CrateBay" />
    <h1>Coming Soon</h1>
    <p>The public website is temporarily hidden.</p>
    <p>CrateBay will return when the release is ready.</p>
  </main>
</body>
</html>
